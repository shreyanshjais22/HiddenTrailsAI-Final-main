<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up | HiddenTrails.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="m-0 p-0 font-sans flex items-center justify-center min-h-screen relative overflow-hidden">

  <div class="absolute inset-0 z-0">
    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80"
         alt="Background" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
  </div>

  <nav class="absolute top-0 w-full flex items-center justify-between px-10 py-5 z-50">
    <a href="index.html" class="text-2xl font-black text-white tracking-tight">
      HiddenTrails.AI
    </a>
  </nav>

  <div class="relative z-10 w-full max-w-md p-8 mx-4 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
      <p class="text-gray-200 text-sm">Join the hidden trails community</p>
    </div>

    <!-- NAME -->
    <div class="relative mb-5">
      <label class="block text-xs font-bold text-gray-200 uppercase tracking-widest mb-2 ml-1">Full Name</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-300">
          <i class="fa-solid fa-user text-sm"></i>
        </span>
        <input
          id="fullName"
          type="text"
          placeholder="Your name"
          class="w-full bg-white/20 border border-white/30 p-3 pl-10 rounded-xl text-white placeholder-gray-300 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
      </div>
    </div>

    <!-- EMAIL -->
    <div class="relative mb-5">
      <label class="block text-xs font-bold text-gray-200 uppercase tracking-widest mb-2 ml-1">Email</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-300">
          <i class="fa-solid fa-envelope text-sm"></i>
        </span>
        <input
          id="email"
          type="email"
          placeholder="you@example.com"
          class="w-full bg-white/20 border border-white/30 p-3 pl-10 rounded-xl text-white placeholder-gray-300 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="relative mb-5">
      <label class="block text-xs font-bold text-gray-200 uppercase tracking-widest mb-2 ml-1">Password</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-300">
          <i class="fa-solid fa-lock text-sm"></i>
        </span>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          class="w-full bg-white/20 border border-white/30 p-3 pl-10 pr-10 rounded-xl text-white placeholder-gray-300 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
        <span id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-300 hover:text-white transition select-none" title="Show / Hide">
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="relative mb-6">
      <label class="block text-xs font-bold text-gray-200 uppercase tracking-widest mb-2 ml-1">Confirm Password</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-300">
          <i class="fa-solid fa-shield-halved text-sm"></i>
        </span>
        <input
          id="confirmPassword"
          type="password"
          placeholder="••••••••"
          class="w-full bg-white/20 border border-white/30 p-3 pl-10 rounded-xl text-white placeholder-gray-300 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
      </div>
    </div>

    <!-- SIGNUP BUTTON -->
    <button
      id="signupBtn"
      class="w-full bg-green-600 text-white py-3.5 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg shadow-green-900/20 transform transition active:scale-95"
    >
      Create Account
    </button>

    <!-- LOGIN LINK -->
    <p class="text-center text-gray-200 mt-8 text-sm">
      Already have an account?
      <a href="auth.html" class="text-green-400 font-bold hover:text-green-300 transition underline-offset-4 hover:underline">
        Login
      </a>
    </p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from
      "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from
      "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtSKfk3j-RaExSaumaeGoQlJQckBDZ32c",
      authDomain: "hiddentrails-ai.firebaseapp.com",
      projectId: "hiddentrails-ai",
      storageBucket: "hiddentrails-ai.firebasestorage.app",
      messagingSenderId: "739490816318",
      appId: "1:739490816318:web:3d1adc77b25cf1dfb70c6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Password toggle
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePassword.innerHTML = isHidden ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
    });

    // Signup logic
    document.getElementById("signupBtn").addEventListener("click", async () => {
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!fullName || !email || !password || !confirmPassword) {
        alert("All fields are required");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
      }

      if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
      }

      const btn = document.getElementById("signupBtn");
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Creating...';

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Create user document in Firestore "users" collection
        await setDoc(doc(db, "users", user.uid), {
          name: fullName,
          email: user.email,
          rewardPoints: 0,
          level: "Rookie",
          completedChallenges: [],
          createdAt: new Date().toISOString()
        });

        alert("Account created successfully! 🎉");
        window.location.href = "dashboard.html";
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });
  </script>

</body>
</html>
