<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Trips | HiddenTrails.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),
                  url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }

    .glass-sidebar {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .trip-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: block;
    }
    .trip-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.1);
      border-color: #10b981;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .status-badge {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 1); }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
  </style>
</head>

<body class="font-sans text-white">

<nav class="bg-black/30 backdrop-blur-lg border-b border-white/10 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
  <div class="flex items-center gap-2">
    <i class="fa-solid fa-compass text-green-400 text-2xl"></i>
    <h1 class="text-2xl font-black text-white tracking-tight">HiddenTrails.AI</h1>
  </div>
  <div class="flex items-center space-x-8 font-medium text-gray-200">
    <a href="index.html" class="hover:text-green-400 transition">Home</a>
    <a href="dashboard.html" class="hover:text-green-400 transition">Dashboard</a>
    <a href="saved.html" class="hover:text-green-400 transition">Saved</a>
    <a href="#" id="logoutBtn" class="bg-red-500/20 text-red-400 px-5 py-2 rounded-xl border border-red-500/50 hover:bg-red-600 hover:text-white transition">Logout</a>
  </div>
</nav>

<div class="flex min-h-[calc(100vh-72px)]">

  <aside class="w-72 glass-sidebar p-8 space-y-3">
    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Main Menu</p>
    <a href="dashboard.html" class="flex items-center gap-3 p-4 text-gray-300 hover:bg-white/10 rounded-2xl transition">
      <i class="fa-solid fa-house"></i> Dashboard
    </a>
    <a href="plantrips.html" class="flex items-center gap-3 p-4 text-gray-300 hover:bg-white/10 rounded-2xl transition">
      <i class="fa-solid fa-map-location-dot"></i> Plan Trip
    </a>
    <a href="saved.html" class="flex items-center gap-3 p-4 text-gray-300 hover:bg-white/10 rounded-2xl transition">
      <i class="fa-solid fa-bookmark"></i> Saved Trips
    </a>
    <a href="rewards.html" class="flex items-center gap-3 p-4 text-gray-300 hover:bg-white/10 rounded-2xl transition">
      <i class="fa-solid fa-gift"></i> Rewards
    </a>
    <a href="photo-challenge.html" class="flex items-center gap-3 p-4 text-gray-300 hover:bg-white/10 rounded-2xl transition">
      <i class="fa-solid fa-camera"></i> Photo Challenge
    </a>
  </aside>

  <main class="flex-1 p-12 overflow-y-auto">
    <div class="max-w-6xl mx-auto">
      <header class="mb-12">
        <h2 class="text-4xl font-black tracking-tight">My Trips ✈️</h2>
        <p class="text-gray-400 mt-2">All your AI-generated itineraries in one place.</p>
      </header>

      <div id="tripsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center p-20">
          <i class="fa-solid fa-spinner fa-spin text-4xl text-green-400 mb-4"></i>
          <p class="text-gray-400">Loading your trips...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, query, where, orderBy, getDocs } from
    "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtSKfk3j-RaExSaumaeGoQlJQckBDZ32c",
    authDomain: "hiddentrails-ai.firebaseapp.com",
    projectId: "hiddentrails-ai",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const container = document.getElementById("tripsContainer");

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => window.location.href = "auth.html");
  });

  // Auth guard + load user's trips
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "auth.html";
      return;
    }

    try {
      // Query the correct "trips" collection, filtered by userId
      const q = query(
        collection(db, "trips"),
        where("userId", "==", user.uid),
        orderBy("createdAt", "desc")
      );

      let snapshot;
      try {
        snapshot = await getDocs(q);
      } catch (indexErr) {
        console.warn("Composite index not ready, using simple query...", indexErr);
        const simpleQ = query(collection(db, "trips"), where("userId", "==", user.uid));
        snapshot = await getDocs(simpleQ);
      }

      if (snapshot.empty) {
        container.innerHTML = `
          <div class="col-span-full text-center p-20 bg-white/5 rounded-3xl border border-dashed border-white/20">
            <div class="text-6xl mb-4">🧭</div>
            <p class="text-gray-400 text-lg mb-4">No trips yet. Plan your first adventure!</p>
            <a href="plantrips.html" class="inline-block bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold transition">
              Plan a Trip <i class="fa-solid fa-arrow-right ml-2"></i>
            </a>
          </div>`;
        return;
      }

      container.innerHTML = "";
      snapshot.forEach(docSnap => {
        const t = docSnap.data();
        const daysCount = t.days?.length || 0;
        const style = t.preference || "Custom";

        const card = document.createElement("a");
        card.href = `itinerary.html?id=${docSnap.id}`;
        card.className = "trip-card group";

        card.innerHTML = `
          <div class="relative h-52 overflow-hidden">
            <img src="${t.hero_image || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80'}"
                 class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
            <div class="absolute top-4 right-4 status-badge px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">
              ${style}
            </div>
          </div>

          <div class="p-6">
            <h3 class="text-xl font-bold mb-2 group-hover:text-green-400 transition">${t.destination}</h3>

            <div class="flex items-center gap-4 text-xs text-gray-400 mb-4 font-medium">
              <span><i class="fa-solid fa-calendar-day mr-1 text-green-400"></i> ${daysCount} Days</span>
              <span><i class="fa-solid fa-wallet mr-1 text-green-400"></i> ₹${t.total_estimated_cost || t.budget || "-"}</span>
            </div>

            ${t.arrivalDate ? `<p class="text-xs text-gray-500 mb-4"><i class="fa-solid fa-plane-departure mr-1"></i> ${t.arrivalDate} → ${t.returnDate}</p>` : ''}

            <div class="w-full text-center py-3 rounded-xl bg-green-500 group-hover:bg-green-600 text-white text-sm font-bold transition">
              View Itinerary <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
            </div>
          </div>
        `;

        container.appendChild(card);
      });
    } catch (err) {
      console.error("Load trips error:", err);
      // Fallback: load all trips if composite index isn't set up yet
      try {
        const fallbackQ = query(collection(db, "trips"), orderBy("createdAt", "desc"));
        const fallbackSnap = await getDocs(fallbackQ);
        container.innerHTML = "";
        if (fallbackSnap.empty) {
          container.innerHTML = `<div class="col-span-full text-center p-20 bg-white/5 rounded-3xl border border-dashed border-white/20">
            <p class="text-gray-400 text-lg">No trips found. <a href="plantrips.html" class="text-green-400 underline">Plan one now!</a></p>
          </div>`;
          return;
        }
        fallbackSnap.forEach(docSnap => {
          const t = docSnap.data();
          const daysCount = t.days?.length || 0;
          const style = t.preference || "Custom";
          const card = document.createElement("a");
          card.href = `itinerary.html?id=${docSnap.id}`;
          card.className = "trip-card group";
          card.innerHTML = `
            <div class="relative h-52 overflow-hidden">
              <img src="${t.hero_image || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80'}"
                   class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
              <div class="absolute top-4 right-4 status-badge px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">${style}</div>
            </div>
            <div class="p-6">
              <h3 class="text-xl font-bold mb-2 group-hover:text-green-400 transition">${t.destination}</h3>
              <div class="flex items-center gap-4 text-xs text-gray-400 mb-4"><span><i class="fa-solid fa-calendar-day mr-1 text-green-400"></i> ${daysCount} Days</span><span><i class="fa-solid fa-wallet mr-1 text-green-400"></i> ₹${t.total_estimated_cost || t.budget || "-"}</span></div>
              <div class="w-full text-center py-3 rounded-xl bg-green-500 group-hover:bg-green-600 text-white text-sm font-bold transition">View Itinerary <i class="fa-solid fa-arrow-right ml-2 text-xs"></i></div>
            </div>`;
          container.appendChild(card);
        });
      } catch (fallbackErr) {
        container.innerHTML = `<p class="text-center text-red-400 p-10">Error loading trips. Please try again.</p>`;
      }
    }
  });
</script>

</body>
</html>
