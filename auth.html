<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | HiddenTrails.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="m-0 p-0 font-sans flex items-center justify-center min-h-screen relative bg-white">

  <nav class="absolute top-0 w-full flex items-center justify-between px-10 py-5 z-50">
    <a href="index.html" class="text-xl font-black text-gray-800 tracking-tight">
      HiddenTrails.AI
    </a>
  </nav>

  <div class="relative z-10 w-full max-w-md p-8 mx-4 bg-gray-50 border border-gray-200 rounded-3xl shadow-xl">
    
    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back</h2>
      <p class="text-gray-500 text-sm">Sign in to plan your next adventure</p>
    </div>

    <div class="relative mb-6">
      <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2 ml-1">Username</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
          <i class="fa-solid fa-user text-sm"></i>
        </span>
        <input
          id="email"
          type="text"
          placeholder="username"
          class="w-full bg-white border border-gray-300 p-3 pl-10 pr-24 rounded-xl text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs font-medium border-l border-gray-300 pl-2">
          @gmail.com
        </span>
      </div>
    </div>

    <div class="relative mb-2">
      <label class="block text-xs font-bold text-gray-600 uppercase tracking-widest mb-2 ml-1">Password</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
          <i class="fa-solid fa-lock text-sm"></i>
        </span>
        <input
          id="password"
          type="password"
          placeholder="••••••••"
          class="w-full bg-white border border-gray-300 p-3 pl-10 pr-10 rounded-xl text-gray-800 placeholder-gray-400 focus:ring-2 focus:ring-green-400 outline-none transition"
        />
        <span
          id="togglePassword"
          class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 hover:text-gray-800 transition select-none"
          title="Show / Hide Password"
        >
          <i class="fa-solid fa-eye"></i>
        </span>
      </div>
    </div>

    <div class="text-right mb-6">
      <a href="#" id="forgotPassword" class="text-xs text-green-600 hover:text-green-700 font-bold tracking-wide transition">
        Forgot Password?
      </a>
    </div>

    <button
      id="loginBtn"
      class="w-full bg-green-600 text-white py-3.5 rounded-xl font-bold text-lg hover:bg-green-700 shadow-lg shadow-green-900/20 transform transition active:scale-95"
    >
      Login
    </button>

    <p class="text-center text-gray-200 mt-8 text-sm">
      Don’t have an account?
      <a href="signup.html" class="text-green-400 font-bold hover:text-green-300 transition underline-offset-4 hover:underline">
        Create Account
      </a>
    </p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtSKfk3j-RaExSaumaeGoQlJQckBDZ32c",
      authDomain: "hiddentrails-ai.firebaseapp.com",
      projectId: "hiddentrails-ai",
      storageBucket: "hiddentrails-ai.firebasestorage.app",
      messagingSenderId: "739490816318",
      appId: "1:739490816318:web:3d1adc77b25cf1dfb70c6f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 👁️ SHOW / HIDE PASSWORD (Updated with Icons)
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePassword.innerHTML = isHidden ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
    });

    function getFullEmail(value) {
      if (!value.includes("@")) { return value + "@gmail.com"; }
      return value;
    }

    // LOGIN LOGIC
    document.getElementById("loginBtn").addEventListener("click", () => {
      let email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        alert("All fields are required");
        return;
      }

      email = getFullEmail(email);

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "dashboard.html";
        })
        .catch(err => {
          alert("Error: " + err.message);
        });
    });

    // FORGOT PASSWORD
    document.getElementById("forgotPassword").addEventListener("click", (e) => {
      e.preventDefault();
      let email = document.getElementById("email").value.trim();
      if (!email) { alert("Enter username/email first"); return; }
      email = getFullEmail(email);
      sendPasswordResetEmail(auth, email)
        .then(() => { alert("Password reset link sent! 📩"); })
        .catch(err => { alert(err.message); });
    });
  </script>

</body>
</html>
