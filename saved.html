<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Saved Journeys | HiddenTrails.AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: #ffffff;
      min-height: 100vh;
    }

    .trip-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: block;
    }
    .trip-card:hover {
      transform: translateY(-6px);
      background: #f1f5f9;
      border-color: #10b981;
      box-shadow: 0 12px 24px rgba(0,0,0,0.08);
    }

    .glass-sidebar {
      background: #f8fafc;
      border-right: 1px solid #e2e8f0;
    }

    .status-badge {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
  </style>
</head>

<body class="font-sans text-gray-800">

<nav class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <div class="flex items-center gap-2">
    <i class="fa-solid fa-compass text-green-400 text-2xl"></i>
    <h1 class="text-xl font-black text-gray-800 tracking-tight">HiddenTrails.AI</h1>
  </div>
  <div class="flex items-center space-x-8 font-medium text-gray-600">
    <a href="index.html" class="hover:text-green-400 transition">Home</a>
    <a href="dashboard.html" class="hover:text-green-400 transition">Dashboard</a>
    <a href="saved.html" class="text-green-400">Saved</a>
    <a href="#" id="logoutBtn" class="bg-red-500/20 text-red-400 px-5 py-2 rounded-xl border border-red-500/50 hover:bg-red-600 hover:text-white transition">Logout</a>
  </div>
</nav>

<div class="flex min-h-[calc(100vh-72px)]">

  <aside class="w-72 glass-sidebar p-8 space-y-3">
    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-6">Main Menu</p>
    <a href="dashboard.html" class="flex items-center gap-3 p-4 text-gray-600 hover:bg-gray-100 rounded-2xl transition">
      <i class="fa-solid fa-house"></i> Dashboard
    </a>
    <a href="plantrips.html" class="flex items-center gap-3 p-4 text-gray-600 hover:bg-gray-100 rounded-2xl transition">
      <i class="fa-solid fa-map-location-dot"></i> Plan Trip
    </a>
    <a href="saved.html" class="flex items-center gap-3 p-4 bg-green-500/20 text-green-400 rounded-2xl font-bold border border-green-500/30">
      <i class="fa-solid fa-bookmark"></i> Saved Trips
    </a>
    <a href="rewards.html" class="flex items-center gap-3 p-4 text-gray-600 hover:bg-gray-100 rounded-2xl transition">
      <i class="fa-solid fa-gift"></i> Rewards
    </a>
    <a href="photo-challenge.html" class="flex items-center gap-3 p-4 text-gray-600 hover:bg-gray-100 rounded-2xl transition">
      <i class="fa-solid fa-camera"></i> Photo Challenge
    </a>
  </aside>

  <main class="flex-1 p-12 overflow-y-auto">
    <div class="max-w-6xl mx-auto">
      <header class="mb-12 flex items-center justify-between">
        <div>
          <h2 class="text-3xl font-black tracking-tight text-gray-800">Saved Journeys 🔖</h2>
          <p class="text-gray-500 mt-2 text-sm">Pick up where you left off on your hidden adventures.</p>
        </div>
        <a href="plantrips.html" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl font-bold transition-all transform hover:scale-105">
          <i class="fa-solid fa-plus mr-2"></i> New Trip
        </a>
      </header>

      <div id="tripsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="col-span-full text-center p-20">
          <i class="fa-solid fa-spinner fa-spin text-4xl text-green-400 mb-4"></i>
          <p class="text-gray-400">Loading your saved trips...</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, deleteDoc, doc, orderBy, query, where, updateDoc } from
    "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtSKfk3j-RaExSaumaeGoQlJQckBDZ32c",
    authDomain: "hiddentrails-ai.firebaseapp.com",
    projectId: "hiddentrails-ai"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const container = document.getElementById("tripsContainer");

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => window.location.href = "auth.html");
  });

  // Delete trip function
  window.deleteTrip = async function(tripId, el) {
    if (!confirm("Delete this trip? This can't be undone.")) return;
    try {
      await deleteDoc(doc(db, "trips", tripId));
      el.closest(".trip-card").remove();
      // Check if container is now empty
      if (container.children.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center p-20 bg-gray-50 rounded-3xl border border-dashed border-gray-300">
          <div class="text-6xl mb-4">🧭</div>
          <p class="text-gray-400 text-lg mb-4">No trips saved. Plan your first adventure!</p>
          <a href="plantrips.html" class="inline-block bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold transition">Plan a Trip <i class="fa-solid fa-arrow-right ml-2"></i></a>
        </div>`;
      }
    } catch (err) {
      console.error("Delete error:", err);
      alert("Failed to delete trip.");
    }
  };

  // Auth guard + load trips
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "auth.html";
      return;
    }

    await loadTrips(user.uid);
  });

  async function loadTrips(uid) {
    try {
      // Try user-scoped query with ordering (requires composite index)
      const q = query(
        collection(db, "trips"),
        where("userId", "==", uid),
        orderBy("createdAt", "desc")
      );
      const snapshot = await getDocs(q);
      renderTrips(snapshot);
    } catch (err) {
      console.warn("Composite index not ready, using simple query...", err);
      // Fallback: query by userId only (no ordering) — still user-scoped!
      try {
        const simpleQ = query(
          collection(db, "trips"),
          where("userId", "==", uid)
        );
        const snapshot = await getDocs(simpleQ);
        renderTrips(snapshot);
      } catch (err2) {
        console.error("Failed to load trips:", err2);
        container.innerHTML = `<p class="text-center text-red-400 p-10">Failed to load trips. Please try again.</p>`;
      }
    }
  }

  function renderTrips(snapshot) {
    if (snapshot.empty) {
      container.innerHTML = `<div class="col-span-full text-center p-20 bg-gray-50 rounded-3xl border border-dashed border-gray-300">
        <div class="text-6xl mb-4">🧭</div>
        <p class="text-gray-400 text-lg mb-4">No trips saved yet. Time to plan one!</p>
        <a href="plantrips.html" class="inline-block bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-xl font-bold transition">Plan a Trip <i class="fa-solid fa-arrow-right ml-2"></i></a>
      </div>`;
      return;
    }

    // Known fallback URLs — if hero_image matches any of these, re-fetch a real image
    const FALLBACK_URLS = [
      "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b",
      "https://images.unsplash.com/photo-1469474968028-56623f02e42e",
    ];

    function isFallbackImage(url) {
      if (!url) return true;
      return FALLBACK_URLS.some(fb => url.includes(fb.split("?")[0]));
    }

    container.innerHTML = "";
    snapshot.forEach(async (docSnap) => {
      const t = docSnap.data();
      const daysCount = t.days?.length || 0;
      const style = t.preference || "Custom";

      // Determine the image — if it's a fallback, fetch a real one
      let heroImage = t.hero_image || "";
      const needsFetch = isFallbackImage(heroImage);

      const card = document.createElement("div");
      card.className = "trip-card group";

      const imgId = `img-${docSnap.id}`;

      card.innerHTML = `
        <a href="itinerary.html?id=${docSnap.id}" class="block">
          <div class="relative h-52 overflow-hidden">
            <img id="${imgId}" src="${needsFetch ? '' : heroImage}"
                 class="w-full h-full object-cover transition duration-500 group-hover:scale-110"
                 style="${needsFetch ? 'background:#e2e8f0;' : ''}">
            <div class="absolute top-4 right-4 status-badge px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">
              ${style}
            </div>
          </div>

          <div class="p-6">
            <h3 class="text-xl font-bold mb-2 group-hover:text-green-400 transition">${t.destination}</h3>

            <div class="flex items-center gap-4 text-xs text-gray-400 mb-4 font-medium">
              <span><i class="fa-solid fa-calendar-day mr-1 text-green-400"></i> ${daysCount} Days</span>
              <span><i class="fa-solid fa-wallet mr-1 text-green-400"></i> ₹${t.total_estimated_cost || t.budget || "-"}</span>
            </div>

            ${t.arrivalDate ? `<p class="text-xs text-gray-500 mb-4"><i class="fa-solid fa-plane-departure mr-1"></i> ${t.arrivalDate} → ${t.returnDate}</p>` : ''}

            <div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl mb-4">
              <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Hidden Score</span>
              <span class="text-green-400 font-black">${t.hidden_score || "8.2"} <small class="text-[10px] opacity-60">/ 10</small></span>
            </div>

            <div class="w-full text-center py-3 rounded-xl bg-green-500 group-hover:bg-green-600 text-white text-sm font-bold transition">
              View Itinerary <i class="fa-solid fa-arrow-right ml-2 text-xs"></i>
            </div>
          </div>
        </a>

        <div class="px-6 pb-4">
          <button onclick="deleteTrip('${docSnap.id}', this)"
            class="w-full text-center py-2 rounded-xl bg-red-500/10 hover:bg-red-500/20 text-red-400 text-xs font-bold transition border border-red-500/20">
            <i class="fa-solid fa-trash mr-1"></i> Delete Trip
          </button>
        </div>
      `;

      container.appendChild(card);

      // If this trip has a stale/fallback image, fetch a real one from the API
      if (needsFetch && t.destination) {
        try {
          const res = await fetch(`http://localhost:5000/get-destination-image?query=${encodeURIComponent(t.destination)}`);
          if (res.ok) {
            const data = await res.json();
            if (data.image) {
              document.getElementById(imgId).src = data.image;
              // Save it back to Firebase so next load is instant
              await updateDoc(doc(db, "trips", docSnap.id), { hero_image: data.image });
            }
          }
        } catch (e) {
          console.warn("Failed to fetch hero image for", t.destination);
        }
      }
    });
  }
</script>

</body>
</html>
